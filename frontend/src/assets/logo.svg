<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61f4c4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9d423;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61f4c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#61f4c4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" opacity="0.15"/>
  
  <!-- Sport Icon - Dumbbell -->
  <g transform="translate(50, 55) scale(0.8)" filter="url(#shadow)">
    <!-- Left Weight -->
    <rect x="10" y="30" width="25" height="40" rx="5" fill="url(#iconGradient)"/>
    <rect x="10" y="30" width="25" height="40" rx="5" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    
    <!-- Right Weight -->
    <rect x="115" y="30" width="25" height="40" rx="5" fill="url(#iconGradient)"/>
    <rect x="115" y="30" width="25" height="40" rx="5" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    
    <!-- Bar -->
    <rect x="35" y="45" width="80" height="10" rx="5" fill="#07111f"/>
    <rect x="35" y="45" width="80" height="10" rx="5" fill="none" stroke="#61f4c4" stroke-width="1" opacity="0.5"/>
    
    <!-- Grip Details -->
    <rect x="50" y="43" width="50" height="14" rx="3" fill="url(#iconGradient)" opacity="0.5"/>
    
    <!-- Motion Lines -->
    <line x1="0" y1="50" x2="5" y2="50" stroke="#61f4c4" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="145" y1="50" x2="150" y2="50" stroke="#4facfe" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="url(#logoGradient)" letter-spacing="2">
    SPORT
  </text>
  <text x="100" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="#ffffff" letter-spacing="4" opacity="0.95">
    EQUIP
  </text>
</svg>
